# ============================================================================
# MCN Platform — 后端日志轮转配置
#
# 安装方式（Ubuntu 服务器）：
#   sudo cp deploy/scripts/logrotate-mcn.conf /etc/logrotate.d/mcn-backend
#   sudo logrotate -d /etc/logrotate.d/mcn-backend   # 测试（dry-run）
#
# 路径说明：将 /opt/mcn-platform 替换为实际部署路径。
# copytruncate 模式：不需要重启 uvicorn（它持有文件句柄，copytruncate 会复制后清空原文件）。
# ============================================================================

/opt/mcn-platform/deploy/logs/backend.log {
    daily              # 每天轮转
    rotate 14          # 保留 14 天
    compress           # 压缩历史日志
    delaycompress      # 延迟一天压缩（避免刚轮转的文件被压缩）
    missingok          # 日志不存在时不报错
    notifempty         # 空文件不轮转
    copytruncate       # 复制后清空（适配 nohup 进程，无需重启）
    maxsize 100M       # 超过 100MB 立即轮转（防止日志暴增）
}
