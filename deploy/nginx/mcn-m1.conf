# ============================================================================
# MCN Platform — Nginx 生产配置
# 部署前必须：
#   1. 将 <your-domain> 替换为实际域名
#   2. 配置 SSL 证书（推荐 Let's Encrypt：certbot --nginx -d <your-domain>）
#   3. 确认证书路径与 ssl_certificate / ssl_certificate_key 一致
# ============================================================================

# HTTP 80 → 强制跳转 HTTPS 443
server {
    listen 80;
    server_name _;
    # 仅做重定向，所有流量转 HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS 443 主服务
server {
    listen 443 ssl;
    http2 on;
    server_name _;  # ← 部署时改为实际域名

    # --- SSL 证书（Let's Encrypt 标准路径，部署时按实际替换）---
    ssl_certificate     /etc/letsencrypt/live/<your-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<your-domain>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- 安全响应头 ---
    add_header X-Frame-Options          "SAMEORIGIN"              always;
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    # HSTS：证书验证通过后再取消注释（启用后浏览器会强制 HTTPS，证书出问题会导致无法访问）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10m;

    # --- gzip 压缩 ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # API 反代到后端 uvicorn（SSE 流式必须关闭 proxy_buffering）
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端静态资源（SPA fallback）
    location / {
        root /var/www/mcn;
        try_files $uri /index.html;

        # 静态资源缓存（hash 文件名可长期缓存）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
