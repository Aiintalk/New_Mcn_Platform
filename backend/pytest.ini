[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=app --cov-report=term-missing
# 注意：覆盖率门槛统一由 scripts/run_coverage.py --gate 强制，
# 这里不再加 --cov-fail-under，避免双标准打架。
markers =
    live: tests requiring real external services (opt-in via OSS_LIVE_TEST=1 env var; skipped by default)
