name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch/PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All jobs must pass
jobs:
  # ------------------------------------------------------------------
  # Backend: unit + integration + coverage gate
  # 跳过 e2e/intake/concurrent（需要运行中服务器，后续单独 job）
  # ------------------------------------------------------------------
  backend:
    name: Backend (unit + integration + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres2026
          POSTGRES_DB: mcn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONUTF8: "1"
      TEST_DB_URL: postgresql+asyncpg://postgres:postgres2026@localhost:5432/mcn_test
      # pydantic_settings Settings 需要这些必填字段；这里只为过 import-time 校验，
      # 实际 DB 连接由 conftest.py 的 AsyncSessionLocal patch 重定向到 TEST_DB_URL
      DATABASE_URL: postgresql+asyncpg://postgres:postgres2026@localhost:5432/mcn_test
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres2026
      TEST_DB: mcn_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (libpq headers for asyncpg)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev postgresql-client

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 锁定 bcrypt 4.0.x 兼容 passlib 1.7.4（passlib 用 bcrypt.__about__，4.1+ 已移除）
          pip install "bcrypt==4.0.1"

      - name: Verify Postgres reachable
        run: |
          PGPASSWORD=postgres2026 psql -h localhost -U postgres -d mcn_test -c "SELECT 1;"

      - name: Init test DB
        run: bash backend/scripts/init_test_db.sh

      - name: Run unit + integration tests
        working-directory: backend
        run: |
          pytest tests/unit/ tests/integration/ -v

      - name: Coverage gate
        working-directory: backend
        run: |
          python scripts/run_coverage.py --gate

  # ------------------------------------------------------------------
  # Frontend: vitest + tsc typecheck
  # ------------------------------------------------------------------
  frontend:
    name: Frontend (vitest + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Run vitest
        run: npm test
